<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE@ 選單精準熱區切換展示</title>
    <style>
        body {
            margin: 0; padding: 0; 
            background-color: #f9fafb; 
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; cursor: none; font-family: sans-serif;
        }

        .hint-text { color: #555; font-size: 0.95rem; margin-bottom: 20px; letter-spacing: 1px; font-weight: bold; }

        /* --- ★ 鈦金屬黑．超窄邊框 iPhone 17 Pro (加入尺寸鎖死) ★ --- */
        .phone-mockup {
            width: 320px; 
            height: 650px; 
            min-height: 650px; /* 鎖死最小高度 */
            max-height: 650px; /* 鎖死最大高度 */
            flex-shrink: 0;    /* 嚴禁被內部內容撐開或壓縮 */
            border-radius: 46px; 
            padding: 8px; /* 極窄邊框 8px */
            position: relative;
            box-sizing: border-box;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            
            /* 鈦黑色金屬光影與細微拉絲紋理 */
            background-image: 
                linear-gradient(90deg, #111 0%, #333 15%, #555 30%, #222 50%, #111 70%, #444 85%, #222 100%),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.05), rgba(255,255,255,0.05) 1px, transparent 1px, transparent 2px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.05) 1px, transparent 1px, transparent 2px);
            background-blend-mode: overlay, normal;
        }

        /* 螢幕本體 */
        .phone-screen {
            width: 100%;
            height: 100%;
            background-color: #7490C4; 
            border-radius: 38px; 
            position: relative;
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
        }

        /* 動態島 */
        .dynamic-island {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            width: 85px; height: 20px; background-color: #000;
            border-radius: 20px; z-index: 50;
        }

        /* --- ★ 聊天室範圍：絕對定位，與手機外殼脫鉤 ★ --- */
        .chat-area {
            position: absolute; /* 抽離排版，絕對不會撐大外殼 */
            top: 0; left: 0; right: 0; bottom: 0; /* 填滿整個內螢幕 */
            width: 100%; height: 100%; 
            padding: 50px 15px 270px 15px; /* 預留底部圖文選單的空間 */
            box-sizing: border-box;
            display: flex; flex-direction: column; 
            overflow-y: auto; scroll-behavior: smooth; scrollbar-width: none; 
        }
        .chat-area::-webkit-scrollbar { display: none; } 

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(10px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .chat-bubble {
            background: #fff; padding: 12px 16px; border-radius: 16px; border-top-left-radius: 4px;
            font-size: 0.85rem; color: #333; width: fit-content; max-width: 85%; margin-bottom: 10px; line-height: 1.5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); animation: popIn 0.25s ease-out forwards; flex-shrink: 0; 
        }

        .menu-container {
            position: absolute; bottom: 0; left: 0; width: 100%; background: #fff; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); 
            z-index: 20; 
        }

        #menu-image { width: 100%; display: block; user-select: none; -webkit-user-drag: none; cursor: pointer; }

        .hotspot {
            position: absolute; z-index: 25; cursor: pointer; 
            background-color: transparent; 
        }

        /* 自訂光暈游標 */
        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.4); border: 2px solid rgba(0, 0, 0, 0.15); 
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            z-index: 9999; transition: transform 0.1s ease-out, background 0.1s ease-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
        }
        .custom-cursor.clicking { transform: translate(-50%, -50%) scale(0.7); background: rgba(0, 0, 0, 0.1); }
    
/* 在觸控設備(如手機)上自動隱藏自訂游標 */
        @media (pointer: coarse) {
            .custom-cursor {
                display: none !important;
            }
        }    
    </style>
</head>
<body>

    <div class="hint-text">👆 點擊選單上的「特定頁籤」來切換分頁，或點擊圖示測試互動</div>

    <div class="phone-mockup">
        <div class="phone-screen">
            <div class="dynamic-island"></div>
            
            <div class="chat-area" id="chat-area">
                <div class="chat-bubble" style="margin-top: auto;">歡迎！請點擊下方選單的「頁籤」切換不同服務 👇</div>
            </div>

            <div class="menu-container">
                <img id="menu-image" src="menu-A.png" alt="LINE 選單">
                
                <div id="hotspots-A">
                    <div class="hotspot" style="top:0; left:0; width:100%; height:50%;" data-message="查看最新上市產品 🧴"></div>
                    <div class="hotspot" style="bottom:0; left:0; width:33.33%; height:50%;" data-message="前往查看線上型錄 🛒"></div>
                    <div class="hotspot" style="bottom:0; left:33.33%; width:33.33%; height:50%;" data-message="為您撥打免付費訂購專線 📞"></div>
                    <div class="hotspot" id="btn-to-B" style="bottom:0; right:0; width:33.33%; height:50%;"></div>
                </div>

                <div id="hotspots-B" style="display: none;">
                    <div class="hotspot" style="top:0; left:0; width:33.33%; height:50%;" data-message="正在為您前往粉絲專頁 👍"></div>
                    <div class="hotspot" style="top:0; left:33.33%; width:33.33%; height:50%;" data-message="查詢離您最近的門市 📍"></div>
                    <div class="hotspot" id="btn-to-A" style="top:0; right:0; width:33.33%; height:50%;"></div>
                    <div class="hotspot" style="bottom:0; left:0; width:100%; height:50%;" data-message="客製化您的專屬產品 ✨"></div>
                </div>
            </div>

        </div> 
    </div> 

    <div class="custom-cursor" id="cursor"></div>

    <script>
        const imgUrlA = "menu-A.png";
        const imgUrlB = "menu-B.png";

        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
        });
        document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
        document.addEventListener('mouseup', () => cursor.classList.remove('clicking'));

        const menuImage = document.getElementById('menu-image');
        const hotspotsA = document.getElementById('hotspots-A');
        const hotspotsB = document.getElementById('hotspots-B');
        const chatArea = document.getElementById('chat-area');

        function addChatBubble(text) {
            const newBubble = document.createElement('div');
            newBubble.classList.add('chat-bubble');
            newBubble.innerText = text;
            chatArea.appendChild(newBubble);
            setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
        }

        document.querySelectorAll('.hotspot[data-message]').forEach(spot => {
            spot.addEventListener('mouseup', (e) => {
                e.stopPropagation(); 
                const msg = spot.getAttribute('data-message');
                addChatBubble(msg);
            });
        });

        document.getElementById('btn-to-B').addEventListener('mouseup', (e) => {
            e.stopPropagation(); 
            menuImage.src = imgUrlB;
            hotspotsA.style.display = 'none'; 
            hotspotsB.style.display = 'block'; 
        });

        document.getElementById('btn-to-A').addEventListener('mouseup', (e) => {
            e.stopPropagation(); 
            menuImage.src = imgUrlA;
            hotspotsB.style.display = 'none'; 
            hotspotsA.style.display = 'block'; 
        });

        menuImage.addEventListener('mouseup', () => {
            addChatBubble('DEMO 版本無法使用該功能 😅');
        });
    </script>
</body>
</html>
